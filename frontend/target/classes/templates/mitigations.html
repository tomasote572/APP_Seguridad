<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mitigaciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="fragments :: navbar"></div>
<div class="container">
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card shadow-sm"><div class="card-body">
                <h3>Nueva mitigación</h3>
                <form th:action="@{/mitigations}" th:object="${mitigation}" method="post">
                    <select class="form-select mb-2" th:field="*{finding}">
                        <option th:each="f : ${findings}" th:value="${f.id}" th:text="${f.title}"></option>
                    </select>
                    <input class="form-control mb-2" th:field="*{controlType}" placeholder="Tipo de control">
                    <input class="form-control mb-2" th:field="*{priorityLevel}" placeholder="Prioridad">
                    <input class="form-control mb-2" th:field="*{status}" placeholder="Estado">
                    <textarea class="form-control mb-2" th:field="*{actionPlan}" placeholder="Plan de acción"></textarea>
                    <button class="btn btn-dark w-100">Guardar</button>
                </form>
            </div></div>
        </div>
        <div class="col-md-8">
            <div class="card shadow-sm"><div class="card-body">
                <h3>Mitigaciones registradas</h3>
                <table class="table table-striped">
                    <thead><tr><th>Hallazgo</th><th>Control</th><th>Prioridad</th><th>Estado</th><th></th></tr></thead>
                    <tbody>
                    <tr th:each="m : ${mitigations}">
                        <td th:text="${m.finding.title}"></td>
                        <td th:text="${m.controlType}"></td>
                        <td th:text="${m.priorityLevel}"></td>
                        <td th:text="${m.status}"></td>
                        <td><a class="btn btn-sm btn-danger" th:href="@{'/mitigations/delete/' + ${m.id}}">Eliminar</a></td>
                    </tr>
                    </tbody>
                </table>
            </div></div>
        </div>
    </div>
</div>
</body>
</html>
