<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - WebSecLab</title>
    <!-- Use the same CSS as the rest of the application -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #1a1d20;
            color: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .error-container {
            text-align: center;
            background: #212529;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 90%;
        }
        .error-code {
            font-size: 80px;
            font-weight: bold;
            color: #e53935;
            margin-bottom: 10px;
        }
        .error-message {
            font-size: 24px;
            margin-bottom: 20px;
        }
        .btn-custom {
            background-color: #0d6efd;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            transition: background-color 0.3s;
        }
        .btn-custom:hover {
            background-color: #0b5ed7;
            color: white;
        }
    </style>
</head>
<body>

<div class="error-container">
    <div class="error-code" th:text="${status != null ? status : 'Error'}">Error</div>
    <div class="error-message" th:text="${error != null ? error : 'Oops, algo salió mal.'}">Oops, algo salió mal.</div>
    <p class="text-muted mb-4" th:text="${message != null ? message : 'La página que buscas no está disponible o hubo un problema.'}"></p>
    <a href="/" class="btn-custom">Volver al Inicio</a>
</div>

</body>
</html>
