<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>WebSecLab</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div th:replace="fragments :: navbar"></div>
<div class="container">
    <div class="hero mb-4">
        <h1>WebSecLab</h1>
        <p>Aplicación web para documentar, gestionar y automatizar el descubrimiento de hallazgos de seguridad (vulnerabilidades) en aplicaciones web y APIs.</p>
    </div>
    <div class="row g-3 mb-4">
        <div class="col-md-3"><div class="card shadow-sm"><div class="card-body"><h5>Activos</h5><p class="display-6" th:text="${assets}">0</p></div></div></div>
        <div class="col-md-3"><div class="card shadow-sm"><div class="card-body"><h5>Hallazgos</h5><p class="display-6" th:text="${findings}">0</p></div></div></div>
        <div class="col-md-3"><div class="card shadow-sm"><div class="card-body"><h5>Tráfico</h5><p class="display-6" th:text="${traffic}">0</p></div></div></div>
        <div class="col-md-3"><div class="card shadow-sm"><div class="card-body"><h5>Mitigaciones</h5><p class="display-6" th:text="${mitigations}">0</p></div></div></div>
    </div>

    <div class="card shadow-sm">
        <div class="card-header">Hallazgos recientes</div>
        <div class="card-body">
            <table class="table table-striped">
                <thead><tr><th>Título</th><th>OWASP</th><th>Endpoint</th><th>Severidad</th></tr></thead>
                <tbody>
                <tr th:each="f : ${latestFindings}">
                    <td th:text="${f.title}"></td>
                    <td th:text="${f.owaspCategory}"></td>
                    <td th:text="${f.endpoint}"></td>
                    <td th:text="${f.severity}" th:class="'severity-' + ${#strings.toLowerCase(f.severity)}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
