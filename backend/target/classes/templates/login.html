<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - WebSecLab</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <h2>WebSecLab</h2>
            <p>Inicia sesión para continuar</p>
        </div>

        <!-- Mensaje de error (Spring Security inyecta param.error) -->
        <div th:if="${param.error}" class="alert alert-danger text-center">
            Usuario o contraseña incorrectos.
        </div>

        <!-- Mensaje de cierre de sesión exitoso -->
        <div th:if="${param.logout}" class="alert alert-success text-center">
            Has cerrado sesión exitosamente.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label">Usuario</label>
                <input type="text" class="form-control" id="username" name="username" required autofocus placeholder="usuario">
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="password" name="password" required placeholder="contraseña">
            </div>
            <button type="submit" class="btn btn-dark">Iniciar Sesión</button>
        </form>
        
        <div class="text-center mt-3 text-muted">
            <small>Solo personal autorizado</small>
        </div>
    </div>
</div>

</body>
</html>
