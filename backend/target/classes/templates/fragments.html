<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">WebSecLab</a>
        <div class="collapse navbar-collapse d-flex justify-content-between">
            <div>
                <a class="btn btn-sm btn-outline-light me-2" th:href="@{/assets}">Activos</a>
                <a class="btn btn-sm btn-outline-light me-2" th:href="@{/findings}">Hallazgos</a>
                <a class="btn btn-sm btn-outline-light me-2" th:href="@{/traffic}">Tráfico</a>
                <a class="btn btn-sm btn-outline-light" th:href="@{/mitigations}">Mitigaciones</a>
            </div>
            
            <!-- Bloque visible sólo si el usuario está autenticado -->
            <div sec:authorize="isAuthenticated()" class="d-flex align-items-center text-white">
                <span class="me-3">Usuario: <strong sec:authentication="name"></strong></span>
                <form th:action="@{/logout}" method="post" class="m-0">
                    <!-- El token CSRF se inyecta automáticamente por Thymeleaf al usar th:action -->
                    <button type="submit" class="btn btn-sm btn-danger">Cerrar Sesión</button>
                </form>
            </div>
        </div>
    </div>
</nav>
</body>
</html>
